<!DOCTYPE html>
<html lang="en">
<head>

  <link rel="stylesheet" href="/assets/css/main.css">

  <!--

    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  -->
</head>
<body>

  <!-- NAV -->
  <nav class="nav" id="site-nav">
    <a href="/" class="nav-logo">Azhagan <span>Labs</span></a>

    </ul>
  </nav>

  <!-- PAGE HEADER -->
  <header class="page-header">
    <p class="breadcrumb"><a href="/">Home</a> · <a href="/fitness/">Fitness</a> · Transformation Plan</p>
    <h1 class="page-title">Body <em>Transformation</em></h1>
    <p class="page-meta">12 Weeks · Bodyweight Only · Updated June 2026</p>
  </header>

  <!-- CONTENT -->
  <main class="page-content">

    <!--
      PASTE YOUR CLAUDE ARTIFACT BELOW.

      Option A — Plain HTML artifact:
      Just paste the HTML directly here.

      Option B — React artifact:
      1. Enable the React scripts in <head> above
      2. Paste the artifact's <div id="root"></div>
      3. Change <script type="text/javascript"> to <script type="text/babel">
      4. Replace ReactDOM.createRoot / render calls if needed (React 18 works fine)

      Wrap it in the artifact-container for consistent styling:
    -->

    <div class="artifact-container">
      <div class="artifact-label">Interactive Artifact</div>
      <div class="artifact-inner">
        <!-- ↓ PASTE ARTIFACT HERE ↓ -->

        <p style="color: var(--text-muted); font-style: italic;">Artifact content goes here.</p>

        <!-- ↑ PASTE ARTIFACT HERE ↑ -->
      </div>
    </div>

  </main>

  <!-- FOOTER -->
  <footer class="site-footer">
    <span class="footer-logo">Azhagan Labs</span>
    <span class="footer-text">Built on GitHub Pages · Updated continuously</span>
  </footer>

  <script>
    const nav = document.getElementById('site-nav');
    window.addEventListener('scroll', () => {
      nav.classList.toggle('scrolled', window.scrollY > 40);
    });
  </script>

</body>
</html>
